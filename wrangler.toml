name = "sites"
main = "workers/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Account & zone (set via environment variables or secrets in CI)
# account_id = "<set CLOUDFLARE_ACCOUNT_ID secret in GitHub>"

[vars]
ENVIRONMENT = "production"

# Uncomment and configure once Cloudflare account is set up:
# [[kv_namespaces]]
# binding = "SITES_KV"
# id = "<kv-namespace-id>"

# [[d1_databases]]
# binding = "DB"
# database_name = "sites-db"
# database_id = "<d1-database-id>"

[env.staging]
name = "sites-staging"
vars = { ENVIRONMENT = "staging" }
